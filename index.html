<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<title>Onze Agenda – Rob &amp; Lizet</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f6f7fb;
  --surface:#ffffff;
  --surface2:#f1f4ff;
  --text:#101828;
  --muted:#667085;
  --border:#e4e7ec;
  --shadow: 0 10px 30px rgba(16,24,40,.10);
  --shadow2: 0 6px 18px rgba(16,24,40,.08);

–primary:#3b82f6;
–primary2:#1d4ed8;
–accent:#a855f7;
–ok:#12b76a;
–warn:#f79009;
–danger:#f04438;
–tab:#0f172a;
–tabmuted:#94a3b8;
–tabbg: rgba(255,255,255,.92);
–radius:18px;
–radius2:14px;
–safeTop: env(safe-area-inset-top);
–safeBottom: env(safe-area-inset-bottom);
}
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
margin:0;
font-family:‘DM Sans’, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
background:
radial-gradient(1200px 800px at 15% -10%, rgba(59,130,246,.18), transparent 60%),
radial-gradient(1200px 800px at 110% 0%, rgba(168,85,247,.12), transparent 55%),
linear-gradient(180deg, #f7f8ff 0%, var(–bg) 55%, #f6f7fb 100%);
color:var(–text);
padding-top: calc(var(–safeTop) + 10px);
padding-bottom: calc(var(–safeBottom) + 86px);
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}
a{ color:inherit; text-decoration:none; }
.container{
max-width: 980px;
margin: 0 auto;
padding: 10px 14px 26px;
}
.topbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding: 6px 2px 12px;
}
.brand{
display:flex;
align-items:center;
gap:12px;
min-width:0;
}
.logo{
width:44px;
height:44px;
border-radius: 14px;
background:
linear-gradient(135deg, rgba(59,130,246,1) 0%, rgba(168,85,247,1) 100%);
box-shadow: 0 10px 22px rgba(59,130,246,.22);
position:relative;
overflow:hidden;
}
.logo:before{
content:””;
position:absolute;
inset:-20%;
background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.55), transparent 55%);
transform: rotate(12deg);
}
.brandText{
display:flex;
flex-direction:column;
min-width:0;
}
.brandText .title{
font-weight: 800;
font-size: 16px;
line-height: 1.1;
letter-spacing: .2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.brandText .subtitle{
font-size: 12px;
color: var(–muted);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.pillRow{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
justify-content:flex-end;
}
.pill{
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 12px;
border-radius: 999px;
background: rgba(255,255,255,.72);
border: 1px solid rgba(228,231,236,.9);
box-shadow: 0 10px 22px rgba(16,24,40,.06);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
font-size: 12px;
color: var(–muted);
}
.pill strong{ color: var(–text); font-weight:800; }
.badgeDot{
width:10px;
height:10px;
border-radius:999px;
background: var(–ok);
box-shadow: 0 0 0 4px rgba(18,183,106,.18);
}
.btn{
border:none;
outline:none;
cursor:pointer;
user-select:none;
-webkit-tap-highlight-color: transparent;
font-family:inherit;
font-weight:700;
border-radius: 14px;
padding: 12px 14px;
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
transition: transform .06s ease, opacity .2s ease, box-shadow .2s ease;
}
.btn:active{ transform: scale(.98); }
.btnPrimary{
background: linear-gradient(135deg, var(–primary) 0%, var(–accent) 100%);
color:#fff;
box-shadow: 0 14px 26px rgba(59,130,246,.18);
}
.btnGhost{
background: rgba(255,255,255,.72);
border: 1px solid rgba(228,231,236,.9);
color: var(–text);
box-shadow: 0 12px 22px rgba(16,24,40,.06);
}
.btnDanger{
background: rgba(240,68,56,.10);
border: 1px solid rgba(240,68,56,.25);
color: #b42318;
}
.btnSmall{ padding:10px 12px; border-radius: 12px; font-size: 13px; }
.btnWide{ width:100%; }
.grid{
display:grid;
grid-template-columns: 1fr;
gap: 14px;
}
@media (min-width: 920px){
.grid{
grid-template-columns: 1.25fr .75fr;
align-items:start;
}
}
.card{
background: rgba(255,255,255,.85);
border: 1px solid rgba(228,231,236,.9);
border-radius: var(–radius);
box-shadow: var(–shadow);
overflow:hidden;
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
}
.cardHeader{
padding: 14px 14px 12px;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
border-bottom: 1px solid rgba(228,231,236,.8);
background:
linear-gradient(180deg, rgba(255,255,255,.92) 0%, rgba(255,255,255,.80) 100%);
}
.cardHeader h2{
margin:0;
font-size: 14px;
letter-spacing:.2px;
}
.cardHeader .hint{
font-size: 12px;
color: var(–muted);
}
.cardBody{ padding: 14px; }
.kpiRow{
display:flex;
gap:10px;
flex-wrap:wrap;
}
.kpi{
flex:1 1 160px;
min-width: 150px;
background: rgba(59,130,246,.07);
border: 1px solid rgba(59,130,246,.15);
border-radius: 16px;
padding: 12px;
}
.kpi .kLabel{
font-size: 12px;
color: var(–muted);
}
.kpi .kValue{
margin-top: 4px;
font-size: 18px;
font-weight: 900;
letter-spacing: .2px;
}
.notice{
padding: 12px;
border-radius: 16px;
background: rgba(16,24,40,.04);
border: 1px solid rgba(16,24,40,.08);
color: var(–muted);
font-size: 12px;
line-height: 1.35;
}
.row{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}
.rowWrap{ flex-wrap:wrap; }
.gap8{ gap:8px; }
.mt10{ margin-top:10px; }
.mt14{ margin-top:14px; }
.mt18{ margin-top:18px; }
.mb6{ margin-bottom:6px; }
.hidden{ display:none !important; }
.field{
display:flex;
flex-direction:column;
gap:8px;
}
label{
font-size: 12px;
color: var(–muted);
font-weight: 700;
}
input, textarea, select{
width:100%;
border-radius: 14px;
border: 1px solid rgba(228,231,236,.9);
background: rgba(255,255,255,.95);
padding: 12px 12px;
font-size: 15px;
outline:none;
color: var(–text);
box-shadow: 0 10px 22px rgba(16,24,40,.05);
}
textarea{ min-height: 96px; resize: vertical; }
input:focus, textarea:focus, select:focus{
border-color: rgba(59,130,246,.55);
box-shadow: 0 0 0 4px rgba(59,130,246,.16), 0 10px 22px rgba(16,24,40,.05);
}
.split{
display:grid;
grid-template-columns: 1fr;
gap: 12px;
}
@media (min-width: 560px){
.split{ grid-template-columns: 1fr 1fr; }
}
.sectionTitle{
font-size: 12px;
color: var(–muted);
font-weight: 800;
letter-spacing:.35px;
text-transform: uppercase;
margin: 0 0 10px;
}
.calendarWrap{
display:flex;
flex-direction:column;
gap: 10px;
}
.calTop{
display:flex;
align-items:center;
justify-content:space-between;
gap: 10px;
flex-wrap:wrap;
}
.monthTitle{
font-weight: 900;
font-size: 16px;
letter-spacing: .2px;
}
.calNav{
display:flex;
align-items:center;
gap: 8px;
}
.iconBtn{
width:44px;
height:44px;
border-radius: 14px;
display:flex;
align-items:center;
justify-content:center;
border: 1px solid rgba(228,231,236,.9);
background: rgba(255,255,255,.85);
box-shadow: var(–shadow2);
cursor:pointer;
user-select:none;
-webkit-tap-highlight-color: transparent;
}
.iconBtn:active{ transform: scale(.98); }
.weekdays, .days{
display:grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
}
.weekdays div{
text-align:center;
font-size: 11px;
color: var(–muted);
font-weight: 800;
letter-spacing:.25px;
}
.day{
background: rgba(255,255,255,.92);
border: 1px solid rgba(228,231,236,.9);
border-radius: 16px;
box-shadow: 0 8px 18px rgba(16,24,40,.05);
min-height: 54px;
padding: 8px 8px 10px;
display:flex;
flex-direction:column;
gap: 6px;
cursor:pointer;
user-select:none;
-webkit-tap-highlight-color: transparent;
position:relative;
overflow:hidden;
}
.day:hover{ border-color: rgba(59,130,246,.35); }
.day:active{ transform: scale(.99); }
.day.disabled{
opacity: .45;
}
.day .dNum{
font-weight: 900;
font-size: 13px;
}
.day .mini{
font-size: 11px;
color: var(–muted);
line-height: 1.1;
display:block;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.day.today{
border-color: rgba(59,130,246,.65);
box-shadow: 0 0 0 4px rgba(59,130,246,.14), 0 8px 18px rgba(16,24,40,.05);
}
.day.selected{
border-color: rgba(168,85,247,.75);
box-shadow: 0 0 0 4px rgba(168,85,247,.14), 0 8px 18px rgba(16,24,40,.05);
}
.day.weekend{
background: rgba(168,85,247,.06);
border-color: rgba(168,85,247,.18);
}
.dotRow{
display:flex;
gap:4px;
flex-wrap:wrap;
}
.dot{
width:8px;
height:8px;
border-radius:999px;
background: rgba(59,130,246,.5);
}
.dot.personal{ background: rgba(168,85,247,.75); }
.dot.shared{ background: rgba(59,130,246,.75); }
.dot.bday{ background: rgba(245,158,11,.85); }
.list{
display:flex;
flex-direction:column;
gap: 10px;
}
.item{
border-radius: 16px;
border: 1px solid rgba(228,231,236,.9);
background: rgba(255,255,255,.92);
box-shadow: 0 10px 22px rgba(16,24,40,.05);
padding: 12px;
display:flex;
flex-direction:column;
gap: 8px;
}
.itemTop{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:10px;
}
.itemTitle{
font-weight: 900;
font-size: 15px;
line-height:1.15;
}
.itemMeta{
font-size: 12px;
color: var(–muted);
margin-top: 2px;
}
.tagRow{
display:flex;
gap:6px;
flex-wrap:wrap;
}
.tag{
font-size: 11px;
font-weight: 800;
padding: 6px 10px;
border-radius: 999px;
border: 1px solid rgba(228,231,236,.9);
background: rgba(16,24,40,.03);
color: var(–muted);
}
.tag.blue{
background: rgba(59,130,246,.10);
border-color: rgba(59,130,246,.22);
color: #1d4ed8;
}
.tag.purple{
background: rgba(168,85,247,.10);
border-color: rgba(168,85,247,.22);
color: #6d28d9;
}
.tag.orange{
background: rgba(245,158,11,.12);
border-color: rgba(245,158,11,.24);
color: #b45309;
}
.itemActions{
display:flex;
gap:8px;
flex-wrap:wrap;
}
.itemActions .btn{ flex:1 1 120px; }
.footerNote{
padding: 10px 2px 0;
text-align:center;
color: var(–muted);
font-size: 12px;
}
.tabbar{
position:fixed;
left:0;
right:0;
bottom:0;
padding: 10px 12px calc(var(–safeBottom) + 10px);
background: rgba(246,247,251,.55);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
border-top: 1px solid rgba(228,231,236,.85);
}
.tabs{
max-width: 980px;
margin: 0 auto;
background: var(–tabbg);
border: 1px solid rgba(228,231,236,.9);
box-shadow: 0 18px 32px rgba(16,24,40,.12);
border-radius: 22px;
display:flex;
align-items:center;
justify-content:space-between;
padding: 8px;
gap: 6px;
}
.tab{
flex:1 1 0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap: 6px;
padding: 10px 6px;
border-radius: 16px;
cursor:pointer;
user-select:none;
-webkit-tap-highlight-color: transparent;
color: var(–tabmuted);
font-weight: 900;
font-size: 11px;
letter-spacing:.2px;
}
.tab svg{ width:20px; height:20px; opacity:.85; }
.tab.active{
background: linear-gradient(135deg, rgba(59,130,246,.14) 0%, rgba(168,85,247,.12) 100%);
color: var(–tab);
}
.tab.active svg{ opacity:1; }
.overlay{
position:fixed;
inset:0;
background: rgba(15,23,42,.55);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
display:flex;
align-items:center;
justify-content:center;
padding: 18px;
z-index: 9999;
}
.modal{
width: min(520px, 100%);
background: rgba(255,255,255,.95);
border: 1px solid rgba(228,231,236,.9);
border-radius: 22px;
box-shadow: 0 28px 60px rgba(16,24,40,.25);
overflow:hidden;
}
.modalHeader{
padding: 14px 16px;
display:flex;
align-items:center;
justify-content:space-between;
gap: 10px;
border-bottom: 1px solid rgba(228,231,236,.9);
}
.modalHeader h3{
margin:0;
font-size: 14px;
letter-spacing:.2px;
}
.modalBody{ padding: 16px; }
.modalFooter{
padding: 14px 16px;
border-top: 1px solid rgba(228,231,236,.9);
display:flex;
gap: 10px;
flex-wrap:wrap;
}
.modalFooter .btn{ flex:1 1 140px; }
.toast{
position: fixed;
left: 50%;
transform: translateX(-50%);
bottom: calc(var(–safeBottom) + 110px);
background: rgba(16,24,40,.92);
color: #fff;
padding: 10px 12px;
border-radius: 14px;
box-shadow: 0 18px 34px rgba(16,24,40,.25);
font-size: 13px;
z-index: 99999;
opacity: 0;
pointer-events:none;
transition: opacity .25s ease;
max-width: min(520px, calc(100% - 24px));
text-align:center;
}
.toast.show{ opacity: 1; }
.readOnly{
position:relative;
}
.readOnly:after{
content:“Gastmodus, alleen kijken”;
position:absolute;
top: 12px;
right: 12px;
font-size: 11px;
font-weight: 900;
padding: 6px 10px;
border-radius: 999px;
background: rgba(245,158,11,.16);
border: 1px solid rgba(245,158,11,.30);
color: #92400e;
}
.smallHelp{
font-size: 12px;
color: var(–muted);
line-height:1.35;
}
hr.sep{
border:none;
border-top: 1px solid rgba(228,231,236,.9);
margin: 14px 0;
}
</head>
<body>

<div class="overlay" id="loginOverlay">
  <div class="modal">
    <div class="modalHeader">
      <h3>Inloggen</h3>
      <div class="pill"><span class="badgeDot" id="modeDot"></span><span id="modeLabel">Privé</span></div>
    </div>
    <div class="modalBody">
      <div class="notice">
        Code is nodig om te wijzigen of te wissen.
        Gastmodus is alleen kijken.
      </div>

 <div class="field mt14">
    <label>Code</label>
    <input id="pinInput" inputmode="numeric" maxlength="12" placeholder="Voer code in" type="password"/>
  </div>

  <div class="split mt14">
    <button class="btn btnPrimary btnWide" id="btnLogin">Inloggen</button>
    <button class="btn btnGhost btnWide" id="btnGuest">Gastmodus</button>
  </div>

  <div class="smallHelp mt14">
    Standaard code, 1234.
    In gastmodus kan Lizet alles bekijken zonder iets te kunnen aanpassen.
  </div>
</div>

<div class="modalFooter">
  <button class="btn btnGhost btnWide" id="btnForgot">Code vergeten</button>
</div>
 </div>
</div>

<div class="toast" id="toast"></div>

<div class="container" id="appRoot">

 <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="brandText">
        <div class="title">Onze Agenda</div>
        <div class="subtitle" id="subTitle">Rob en Lizet</div>
      </div>
    </div>

<div class="pillRow">
  <div class="pill">
    <span class="badgeDot" id="syncDot"></span>
    <span>Status, <strong id="syncState">Lokaal</strong></span>
  </div>
  <button class="btn btnGhost btnSmall" id="btnSettings">Instellingen</button>
</div>
 </div>

 <div class="grid">

<div class="card" id="cardMain">
  <div class="cardHeader">
    <h2 id="mainTitle">Kalender</h2>
    <div class="hint" id="mainHint">Tik op een dag</div>
  </div>

  <div class="cardBody" id="viewCalendar">
    <div class="calendarWrap">
      <div class="calTop">
        <div>
          <div class="monthTitle" id="monthTitle">Maart 2026</div>
          <div class="smallHelp" id="selLabel">Geen dag gekozen</div>
        </div>

        <div class="calNav">
          <div class="iconBtn" id="prevMonth" title="Vorige maand">
            <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="iconBtn" id="todayBtn" title="Vandaag">
            <svg viewBox="0 0 24 24" fill="none"><path d="M8 7V3M16 7V3M4 11h16M6 5h12a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="iconBtn" id="nextMonth" title="Volgende maand">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>

      <div class="weekdays">
        <div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div>
      </div>

      <div class="days" id="daysGrid"></div>

      <hr class="sep"/>

      <div class="row rowWrap">
        <button class="btn btnPrimary" id="btnAddEvent">Afspraak toevoegen</button>
        <button class="btn btnGhost" id="btnAddBday">Verjaardag toevoegen</button>
      </div>

      <div class="notice mt10" id="modeNotice"></div>
    </div>
  </div>

  <div class="cardBody hidden" id="viewList">
    <div class="row rowWrap mb6">
      <div>
        <div class="sectionTitle">Afspraken op geselecteerde dag</div>
        <div class="smallHelp" id="listSub">Kies eerst een dag</div>
      </div>
      <button class="btn btnGhost btnSmall" id="btnBackToCal">Terug</button>
    </div>

    <div class="list" id="itemsList"></div>
  </div>

  <div class="cardBody hidden" id="viewAdd">
    <div class="row rowWrap mb6">
      <div>
        <div class="sectionTitle" id="formTitle">Nieuwe afspraak</div>
        <div class="smallHelp" id="formSub">Wordt opgeslagen op je toestel</div>
      </div>
      <button class="btn btnGhost btnSmall" id="btnCancelForm">Annuleren</button>
    </div>

    <div class="split">
      <div class="field">
        <label>Type</label>
        <select id="typeSelect">
          <option value="shared">Samen</option>
          <option value="personal">Privé</option>
          <option value="bday">Verjaardag</option>
        </select>
      </div>
      <div class="field">
        <label>Datum</label>
        <input id="dateInput" type="date"/>
      </div>
    </div>

    <div class="split mt14">
      <div class="field">
        <label>Tijd</label>
        <input id="timeInput" type="time"/>
      </div>
      <div class="field">
        <label>Locatie</label>
        <input id="locInput" placeholder="Bijv. thuis, ziekenhuis, Venlo" type="text"/>
      </div>
    </div>

    <div class="field mt14">
      <label>Titel</label>
      <input id="titleInput" placeholder="Bijv. huisarts, etentje, VVV" type="text"/>
    </div>

    <div class="field mt14">
      <label>Notities</label>
      <textarea id="noteInput" placeholder="Extra info"></textarea>
    </div>

    <div class="row rowWrap mt14">
      <button class="btn btnPrimary btnWide" id="btnSave">Opslaan</button>
      <button class="btn btnDanger btnWide" id="btnDelete" style="display:none;">Verwijderen</button>
    </div>
  </div>

</div>

<div class="card" id="cardSide">
  <div class="cardHeader">
    <h2>Overzicht</h2>
    <div class="hint">Snel zien</div>
  </div>
  <div class="cardBody" id="sideBody">

    <div class="kpiRow">
      <div class="kpi">
        <div class="kLabel">Deze maand</div>
        <div class="kValue" id="kMonth">0</div>
      </div>
      <div class="kpi">
        <div class="kLabel">Vandaag</div>
        <div class="kValue" id="kToday">0</div>
      </div>
      <div class="kpi">
        <div class="kLabel">Verjaardagen</div>
        <div class="kValue" id="kBday">0</div>
      </div>
    </div>

    <div class="notice mt14" id="quickInfo"></div>

    <div class="row rowWrap mt14">
      <button class="btn btnGhost btnWide" id="btnExport">Export</button>
      <button class="btn btnGhost btnWide" id="btnImport">Import</button>
    </div>

    <div class="row rowWrap mt10">
      <button class="btn btnGhost btnWide" id="btnClear">Alles wissen</button>
    </div>

    <div class="footerNote mt18">
      made by Rob Borghouts 2026
    </div>

  </div>
</div>
 </div>

 <div class="notice">

<script>
(function(){
  const $ = (id)=>document.getElementById(id);

  const storeKey = "agenda_v3_data";
  const pinKey = "agenda_v3_pin";
  const modeKey = "agenda_v3_mode";
  const syncKey = "agenda_v3_sync";

  const defaultPin = "1234";

  let state = {
    mode: "locked",
    sync: "local",
    view: "calendar",
    year: 0,
    month: 0,
    selectedDate: null,
    editingId: null,
    data: []
  };

  const monthsNL = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];
  const pad2 = (n)=>String(n).padStart(2,"0");
  const ymd = (d)=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const parseYMD = (s)=>{
    const [y,m,dd] = s.split("-").map(Number);
    return new Date(y, m-1, dd, 12, 0, 0, 0);
  };
  const isSameDay = (a,b)=> a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  const isWeekend = (d)=> {
    const wd = d.getDay();
    return wd===0 || wd===6;
  };
  const mondayIndex = (jsDay)=> (jsDay+6)%7;

  const toastEl = $("toast");
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=>toastEl.classList.remove("show"), 1800);
  }

  function getPin(){
    return localStorage.getItem(pinKey) || defaultPin;
  }
  function setPin(p){
    localStorage.setItem(pinKey, p);
  }
  function getMode(){
    return localStorage.getItem(modeKey) || "locked";
  }
  function setMode(m){
    localStorage.setItem(modeKey, m);
    state.mode = m;
    renderModeUI();
  }
  function getSync(){
    return localStorage.getItem(syncKey) || "local";
  }
  function setSync(v){
    localStorage.setItem(syncKey, v);
    state.sync = v;
    renderSyncUI();
  }

  function load(){
    try{
      const raw = localStorage.getItem(storeKey);
      state.data = raw ? JSON.parse(raw) : [];
    }catch(e){
      state.data = [];
    }
  }
  function save(){
    localStorage.setItem(storeKey, JSON.stringify(state.data));
    renderAll();
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function renderModeUI(){
    const locked = state.mode !== "unlocked";
    const dot = $("modeDot");
    const label = $("modeLabel");
    const notice = $("modeNotice");
    const lockDot = $("lockDot");
    const lockLabel = $("lockLabel");

    if(locked){
      dot.style.background = "var(--warn)";
      dot.style.boxShadow = "0 0 0 4px rgba(245,158,11,.18)";
      label.textContent = "Gastmodus";
      notice.textContent = "Gastmodus, je kan alleen kijken. Wijzigen en wissen is geblokkeerd.";
      lockDot.style.background = "var(--warn)";
      lockDot.style.boxShadow = "0 0 0 4px rgba(245,158,11,.18)";
      lockLabel.textContent = "Vergrendeld";
      $("cardMain").classList.add("readOnly");
    }else{
      dot.style.background = "var(--ok)";
      dot.style.boxShadow = "0 0 0 4px rgba(18,183,106,.18)";
      label.textContent = "Privé";
      notice.textContent = "Privé, je kan alles toevoegen, wijzigen en wissen.";
      lockDot.style.background = "var(--ok)";
      lockDot.style.boxShadow = "0 0 0 4px rgba(18,183,106,.18)";
      lockLabel.textContent = "Ontgrendeld";
      $("cardMain").classList.remove("readOnly");
    }

    $("btnAddEvent").disabled = locked;
    $("btnAddBday").disabled = locked;
    $("btnClear").disabled = locked;
    $("btnSave").disabled = locked;
    $("btnDelete").disabled = locked;
    $("btnSavePin").disabled = locked;
    $("newPin").disabled = locked;
  }

  function renderSyncUI(){
    const syncDot = $("syncDot");
    const syncState = $("syncState");

    if(state.sync === "local"){
      syncDot.style.background = "var(--ok)";
      syncDot.style.boxShadow = "0 0 0 4px rgba(18,183,106,.18)";
      syncState.textContent = "Lokaal";
    }else{
      syncDot.style.background = "var(--primary)";
      syncDot.style.boxShadow = "0 0 0 4px rgba(59,130,246,.18)";
      syncState.textContent = "Handmatig";
    }

    $("syncSelect").value = state.sync;
  }

  function setView(view){
    state.view = view;

    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(t=>t.classList.toggle("active", t.dataset.tab===view));

    $("viewCalendar").classList.toggle("hidden", view!=="calendar");
    $("viewList").classList.toggle("hidden", view!=="list");
    $("viewAdd").classList.toggle("hidden", view!=="add");

    if(view==="help"){
      $("mainTitle").textContent = "Info";
      $("mainHint").textContent = "Tips";
      $("viewCalendar").classList.remove("hidden");
      $("viewList").classList.add("hidden");
      $("viewAdd").classList.add("hidden");
      renderHelp();
      return;
    }

    $("mainTitle").textContent = view==="add" ? "Toevoegen" : (view==="list" ? "Lijst" : "Kalender");
    $("mainHint").textContent = view==="add" ? "Maak of wijzig" : (view==="list" ? "Afspraken" : "Tik op een dag");
    if(view==="calendar"){
      renderCalendar();
    }
    if(view==="list"){
      renderList();
    }
    if(view==="add"){
      openAddForm();
    }
  }

  function renderHelp(){
    const cal = $("viewCalendar");
    cal.innerHTML = `
      <div class="notice">
        Zo werkt het.
        Tik op een dag in de kalender.
        Gebruik Lijst om afspraken van die dag te zien.
        Gebruik Toevoegen om een afspraak te maken.
        Export en import werkt handig tussen jouw telefoon en Lizet haar telefoon.
      </div>

      <div class="notice mt10">
        Gastmodus.
        Lizet kan alles bekijken.
        Ze kan niets aanpassen of wissen.
      </div>

      <div class="notice mt10">
        Tip.
        Zet Sync op Handmatig.
        Exporteer op jouw telefoon.
        Plak import op Lizet haar telefoon.
      </div>
    `;
  }

  function renderCalendar(){
    const grid = $("daysGrid");
    grid.innerHTML = "";

    const first = new Date(state.year, state.month, 1, 12);
    const daysInMonth = new Date(state.year, state.month+1, 0, 12).getDate();
    const startIndex = mondayIndex(first.getDay());

    const prevMonthDays = new Date(state.year, state.month, 0, 12).getDate();

    const today = new Date();
    const selected = state.selectedDate ? parseYMD(state.selectedDate) : null;

    $("monthTitle").textContent = `${monthsNL[state.month]} ${state.year}`;
    $("selLabel").textContent = state.selectedDate ? `Gekozen, ${formatLong(selected)}` : "Geen dag gekozen";

    const cells = 42;
    for(let i=0;i<cells;i++){
      const dayIndex = i - startIndex + 1;
      let d, inMonth=true;

      if(dayIndex<=0){
        d = new Date(state.year, state.month-1, prevMonthDays + dayIndex, 12);
        inMonth=false;
      }else if(dayIndex>daysInMonth){
        d = new Date(state.year, state.month+1, dayIndex-daysInMonth, 12);
        inMonth=false;
      }else{
        d = new Date(state.year, state.month, dayIndex, 12);
      }

      const dateStr = ymd(d);
      const dayEl = document.createElement("div");
      dayEl.className = "day";
      if(!inMonth) dayEl.classList.add("disabled");
      if(isWeekend(d)) dayEl.classList.add("weekend");
      if(isSameDay(d, today)) dayEl.classList.add("today");
      if(selected && isSameDay(d, selected)) dayEl.classList.add("selected");

      const items = getItemsOn(dateStr);
      const dots = renderDots(items);

      dayEl.innerHTML = `
        <div class="row">
          <div class="dNum">${d.getDate()}</div>
          <div class="mini">${items.length ? items.length+"x" : ""}</div>
        </div>
        ${dots}
      `;

      dayEl.addEventListener("click", ()=>{
        state.selectedDate = dateStr;
        setView("list");
        renderAll();
      });

      grid.appendChild(dayEl);
    }

    renderKPIs();
  }

  function renderDots(items){
    if(!items.length) return `<div class="dotRow"></div>`;
    const kinds = {};
    items.forEach(it=>{
      kinds[it.type] = true;
    });
    let html = `<div class="dotRow">`;
    if(kinds.shared) html += `<span class="dot shared"></span>`;
    if(kinds.personal) html += `<span class="dot personal"></span>`;
    if(kinds.bday) html += `<span class="dot bday"></span>`;
    html += `</div>`;
    return html;
  }

  function formatLong(d){
    const wd = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"][d.getDay()];
    return `${wd} ${d.getDate()} ${monthsNL[d.getMonth()]} ${d.getFullYear()}`;
  }

  function getItemsOn(dateStr){
    return state.data
      .filter(x=>x.date===dateStr)
      .sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  }

  function renderList(){
    const list = $("itemsList");
    list.innerHTML = "";

    if(!state.selectedDate){
      $("listSub").textContent = "Kies eerst een dag in de kalender";
      return;
    }

    const d = parseYMD(state.selectedDate);
    $("listSub").textContent = formatLong(d);

    const items = getItemsOn(state.selectedDate);
    if(!items.length){
      list.innerHTML = `<div class="notice">Geen afspraken op deze dag.</div>`;
      return;
    }

    items.forEach(it=>{
      const el = document.createElement("div");
      el.className = "item";
      const tag = it.type==="shared" ? "Samen" : (it.type==="personal" ? "Privé" : "Verjaardag");
      const tagClass = it.type==="shared" ? "blue" : (it.type==="personal" ? "purple" : "orange");
      const time = it.time ? it.time : "";
      const metaParts = [];
      if(time) metaParts.push(time);
      if(it.location) metaParts.push(it.location);
      const meta = metaParts.join(" , ");

      el.innerHTML = `
        <div class="itemTop">
          <div>
            <div class="itemTitle">${escapeHTML(it.title || "(zonder titel)")}</div>
            <div class="itemMeta">${escapeHTML(meta)}</div>
          </div>
          <div class="tagRow">
            <div class="tag ${tagClass}">${tag}</div>
          </div>
        </div>

        ${it.note ? `<div class="notice">${escapeHTML(it.note)}</div>` : ""}

        <div class="itemActions">
          <button class="btn btnGhost btnSmall" data-act="edit">Wijzig</button>
          <button class="btn btnDanger btnSmall" data-act="del">Verwijder</button>
        </div>
      `;

      el.querySelector('[data-act="edit"]').addEventListener("click", ()=>{
        if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet wijzigen"); return; }
        state.editingId = it.id;
        setView("add");
        fillForm(it);
      });

      el.querySelector('[data-act="del"]').addEventListener("click", ()=>{
        if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet wissen"); return; }
        if(!confirm("Afspraak verwijderen?")) return;
        state.data = state.data.filter(x=>x.id!==it.id);
        save();
        toast("Verwijderd");
      });

      list.appendChild(el);
    });

    renderKPIs();
  }

  function openAddForm(){
    $("formSub").textContent = state.mode==="unlocked" ? "Wordt opgeslagen op je toestel" : "Gastmodus, je kan niets opslaan";
    $("btnDelete").style.display = "none";
    $("formTitle").textContent = "Nieuwe afspraak";
    state.editingId = null;

    const defaultDate = state.selectedDate || ymd(new Date());
    $("dateInput").value = defaultDate;
    $("timeInput").value = "";
    $("locInput").value = "";
    $("titleInput").value = "";
    $("noteInput").value = "";
    $("typeSelect").value = "shared";
  }

  function fillForm(it){
    $("formTitle").textContent = "Afspraak wijzigen";
    $("dateInput").value = it.date || "";
    $("timeInput").value = it.time || "";
    $("locInput").value = it.location || "";
    $("titleInput").value = it.title || "";
    $("noteInput").value = it.note || "";
    $("typeSelect").value = it.type || "shared";
    $("btnDelete").style.display = "inline-flex";
  }

  function currentFormData(){
    return {
      type: $("typeSelect").value,
      date: $("dateInput").value,
      time: $("timeInput").value,
      location: $("locInput").value.trim(),
      title: $("titleInput").value.trim(),
      note: $("noteInput").value.trim()
    };
  }

  function renderKPIs(){
    const today = ymd(new Date());
    const monthKey = `${state.year}-${pad2(state.month+1)}`;

    const inMonth = state.data.filter(x=>x.date && x.date.startsWith(monthKey));
    const todayItems = state.data.filter(x=>x.date===today);
    const bdays = state.data.filter(x=>x.type==="bday");

    $("kMonth").textContent = String(inMonth.length);
    $("kToday").textContent = String(todayItems.length);
    $("kBday").textContent = String(bdays.length);

    const sel = state.selectedDate ? getItemsOn(state.selectedDate) : [];
    const next = getNextItem();

    const parts = [];
    if(state.selectedDate){
      parts.push(`Gekozen dag, ${sel.length} afspraak`);
    }else{
      parts.push("Kies een dag in de kalender");
    }
    if(next){
      parts.push(`Volgende, ${formatNext(next)}`);
    }
    parts.push(state.mode==="unlocked" ? "Privé" : "Gastmodus");

    $("quickInfo").textContent = parts.join(" , ");
  }

  function getNextItem(){
    const now = new Date();
    const items = state.data
      .filter(x=>x.date)
      .map(x=>{
        const d = parseYMD(x.date);
        let t = "00:00";
        if(x.time) t = x.time;
        const [hh,mm] = t.split(":").map(Number);
        d.setHours(hh||0, mm||0, 0, 0);
        return { ...x, _dt: d };
      })
      .filter(x=>x._dt >= now)
      .sort((a,b)=>a._dt - b._dt);

    return items[0] || null;
  }

  function formatNext(it){
    const d = it._dt;
    const ds = `${d.getDate()} ${monthsNL[d.getMonth()]}`;
    const ts = it.time ? it.time : "";
    return `${ds} ${ts} ${it.title || ""}`.trim();
  }

  function escapeHTML(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function initMonth(){
    const now = new Date();
    state.year = now.getFullYear();
    state.month = now.getMonth();
  }

  function showLogin(){
    $("loginOverlay").classList.remove("hidden");
    $("pinInput").value = "";
    renderModeUI();
  }
  function hideLogin(){
    $("loginOverlay").classList.add("hidden");
  }

  function showSettings(){
    $("settingsOverlay").classList.remove("hidden");
    renderModeUI();
    renderSyncUI();
  }
  function hideSettings(){
    $("settingsOverlay").classList.add("hidden");
  }

  function showImport(){
    $("importOverlay").classList.remove("hidden");
    $("importText").value = "";
  }
  function hideImport(){
    $("importOverlay").classList.add("hidden");
  }

  function renderAll(){
    if(state.view==="calendar") renderCalendar();
    if(state.view==="list") renderList();
    if(state.view==="add") {}
    renderKPIs();
    renderModeUI();
    renderSyncUI();
  }

  function exportData(){
    const payload = {
      v: 3,
      created: new Date().toISOString(),
      data: state.data
    };
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  }

  function importData(str){
    const raw = decodeURIComponent(escape(atob(str.trim())));
    const payload = JSON.parse(raw);
    if(!payload || !Array.isArray(payload.data)) throw new Error("Ongeldige data");
    state.data = payload.data.map(x=>({
      id: x.id || uid(),
      type: x.type || "shared",
      date: x.date || "",
      time: x.time || "",
      location: x.location || "",
      title: x.title || "",
      note: x.note || ""
    }));
    save();
  }

  function wire(){
    document.querySelectorAll(".tab").forEach(t=>{
      t.addEventListener("click", ()=>{
        const v = t.dataset.tab;
        setView(v);
      });
    });

    $("prevMonth").addEventListener("click", ()=>{
      state.month--;
      if(state.month<0){ state.month=11; state.year--; }
      renderAll();
    });
    $("nextMonth").addEventListener("click", ()=>{
      state.month++;
      if(state.month>11){ state.month=0; state.year++; }
      renderAll();
    });
    $("todayBtn").addEventListener("click", ()=>{
      initMonth();
      state.selectedDate = ymd(new Date());
      setView("list");
      renderAll();
    });

    $("btnBackToCal").addEventListener("click", ()=>{
      setView("calendar");
      renderAll();
    });

    $("btnAddEvent").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet toevoegen"); return; }
      state.editingId = null;
      setView("add");
      $("typeSelect").value = "shared";
      $("dateInput").value = state.selectedDate || ymd(new Date());
      $("timeInput").value = "";
      $("locInput").value = "";
      $("titleInput").value = "";
      $("noteInput").value = "";
      renderAll();
    });

    $("btnAddBday").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet toevoegen"); return; }
      state.editingId = null;
      setView("add");
      $("typeSelect").value = "bday";
      $("dateInput").value = state.selectedDate || ymd(new Date());
      $("timeInput").value = "";
      $("locInput").value = "";
      $("titleInput").value = "";
      $("noteInput").value = "";
      renderAll();
    });

    $("btnCancelForm").addEventListener("click", ()=>{
      setView(state.selectedDate ? "list" : "calendar");
      renderAll();
    });

    $("btnSave").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet opslaan"); return; }
      const f = currentFormData();
      if(!f.date){ toast("Kies een datum"); return; }
      if(!f.title){ toast("Vul een titel"); return; }

      if(state.editingId){
        const idx = state.data.findIndex(x=>x.id===state.editingId);
        if(idx>=0){
          state.data[idx] = { ...state.data[idx], ...f };
          save();
          toast("Gewijzigd");
        }
      }else{
        state.data.push({ id: uid(), ...f });
        save();
        toast("Opgeslagen");
      }

      state.selectedDate = f.date;
      setView("list");
      renderAll();
    });

    $("btnDelete").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet wissen"); return; }
      if(!state.editingId) return;
      if(!confirm("Afspraak verwijderen?")) return;
      state.data = state.data.filter(x=>x.id!==state.editingId);
      save();
      toast("Verwijderd");
      setView("list");
      renderAll();
    });

    $("btnSettings").addEventListener("click", showSettings);
    $("btnCloseSettings").addEventListener("click", hideSettings);

    $("btnLock").addEventListener("click", ()=>{
      setMode("locked");
      toast("Gastmodus aan");
      hideSettings();
      renderAll();
    });

    $("btnUnlock").addEventListener("click", ()=>{
      const pin = prompt("Voer code in");
      if(pin===null) return;
      if(pin.trim()===getPin()){
        setMode("unlocked");
        toast("Ontgrendeld");
        hideSettings();
        renderAll();
      }else{
        toast("Verkeerde code");
      }
    });

    $("btnSavePin").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Eerst ontgrendelen"); return; }
      const p = $("newPin").value.trim();
      if(p.length<3){ toast("Code te kort"); return; }
      setPin(p);
      $("newPin").value = "";
      toast("Code opgeslagen");
    });

    $("syncSelect").addEventListener("change", ()=>{
      setSync($("syncSelect").value);
      toast("Sync opgeslagen");
    });

    $("btnExport").addEventListener("click", ()=>{
      const txt = exportData();
      navigator.clipboard?.writeText(txt).then(()=>{
        toast("Export gekopieerd");
      }).catch(()=>{
        prompt("Kopieer dit", txt);
      });
    });

    $("btnImport").addEventListener("click", showImport);
    $("btnCloseImport").addEventListener("click", hideImport);

    $("btnDoImport").addEventListener("click", ()=>{
      try{
        importData($("importText").value);
        toast("Import klaar");
        hideImport();
        renderAll();
      }catch(e){
        toast("Import fout");
      }
    });

    $("btnClear").addEventListener("click", ()=>{
      if(state.mode!=="unlocked"){ toast("Gastmodus, je kan niet wissen"); return; }
      if(!confirm("Alles wissen?")) return;
      state.data = [];
      save();
      toast("Alles gewist");
      renderAll();
    });

    $("btnLogin").addEventListener("click", ()=>{
      const pin = $("pinInput").value.trim();
      if(pin===getPin()){
        setMode("unlocked");
        hideLogin();
        toast("Welkom");
        renderAll();
      }else{
        toast("Verkeerde code");
      }
    });

    $("btnGuest").addEventListener("click", ()=>{
      setMode("locked");
      hideLogin();
      toast("Gastmodus");
      renderAll();
    });

    $("btnForgot").addEventListener("click", ()=>{
      alert("Standaard code is 1234. Als je die hebt veranderd en vergeten, verwijder Safari website data van deze site om te resetten.");
    });
  }

  function boot(){
    initMonth();
    load();
    state.mode = getMode();
    state.sync = getSync();
    renderSyncUI();
    renderModeUI();
    wire();
    setView("calendar");
    showLogin();
    renderAll();
  }

  boot();
})();
</script>

</body>
</html>
