<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Onze Agenda"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#ffd7e6"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
  <link rel="apple-touch-icon" href="icon-512.png"/>
  <title>Onze Agenda - Rob & Lizet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap">

  <!-- === ONESIGNAL (toegevoegd) === -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "bd952794-c008-4b73-bb77-94f7df223bd0",
        safari_web_id: "web.onesignal.auto.458f9dc8-6677-4788-b5a2-9d66a9d7a179",
        notifyButton: { enable: true }
      });
    });
  </script>

  <style>
    :root{
      --bg1:#fff7f0;
      --bg2:#f4f1ff;
      --bg3:#eef7ff;
      --ink:#1d2330;
      --muted:#5a6578;
      --card:rgba(255,255,255,0.72);
      --card2:rgba(255,255,255,0.55);
      --stroke:rgba(28,35,48,0.10);
      --shadow:0 18px 50px rgba(12,18,30,0.10);
      --shadow2:0 10px 30px rgba(12,18,30,0.08);
      --pill:rgba(255,255,255,0.65);
      --good:#2ecc71;
      --warn:#ff9f43;
      --dotA:#6bb6ff;
      --dotB:#ff9ac1;
      --dotM:#a7a2ff;
      --accent1:#ffd7e6;
      --accent2:#d6f0ff;
      --accent3:#efe4ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(255,168,217,0.35), transparent 55%),
        radial-gradient(1000px 650px at 85% 5%, rgba(143,209,255,0.35), transparent 60%),
        radial-gradient(900px 700px at 40% 120%, rgba(191,164,255,0.35), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 55%, var(--bg3));
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }
    .app{max-width:560px;margin:0 auto;padding:16px 14px 110px;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 8px 14px;position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(255,247,240,0.80),rgba(255,247,240,0.30),transparent);backdrop-filter:blur(10px);}
    .brand{display:flex;align-items:center;gap:10px;min-width:0;}
    .avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,rgba(255,154,193,0.9),rgba(107,182,255,0.9));box-shadow:0 10px 30px rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.8);flex:0 0 auto;}
    .brandText{min-width:0;line-height:1.05;}
    .brandTitle{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brandSub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .statusPill{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;background:var(--pill);border:1px solid var(--stroke);box-shadow:var(--shadow2);white-space:nowrap;font-weight:700;font-size:12px;user-select:none;}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--good);box-shadow:0 0 0 5px rgba(46,204,113,0.15);}
    .dot.off{background:#b2becd;box-shadow:0 0 0 5px rgba(178,190,205,0.18);}
    .badge{padding:10px 12px;border-radius:18px;border:1px solid rgba(255,255,255,0.65);background:linear-gradient(135deg,rgba(255,215,230,0.85),rgba(214,240,255,0.85),rgba(239,228,255,0.85));box-shadow:var(--shadow2);font-weight:900;font-size:12px;letter-spacing:0.6px;text-align:center;line-height:1.05;user-select:none;}
    .btn{appearance:none;border:0;background:var(--pill);border:1px solid var(--stroke);color:var(--ink);padding:10px 14px;border-radius:999px;font-weight:800;box-shadow:var(--shadow2);cursor:pointer;}
    .btn:active{transform:scale(0.99)}
    .btn.primary{background:linear-gradient(135deg,rgba(255,154,193,0.35),rgba(107,182,255,0.35));}
    .btn.small{padding:8px 12px;font-size:12px}
    .btn.ghost{background:transparent}
    .panel{background:var(--card);border:1px solid var(--stroke);border-radius:26px;padding:16px 16px 14px;box-shadow:var(--shadow);backdrop-filter:blur(14px);}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    h2{margin:0;font-size:20px;letter-spacing:-0.2px;}
    .sub{margin:2px 0 0;color:var(--muted);font-size:13px;}
    .calendarHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
    .monthTitle{font-size:20px;font-weight:900;letter-spacing:-0.2px;text-transform:lowercase;}
    .navBtns{display:flex;gap:10px;align-items:center;}
    .calWrap{margin-top:12px;background:var(--card2);border:1px solid var(--stroke);border-radius:22px;padding:12px;box-shadow:var(--shadow2);}
    .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:6px 4px 10px;color:var(--muted);font-size:12px;font-weight:800;text-align:center;}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:2px 4px 6px;}
    .day{position:relative;height:44px;border-radius:16px;border:1px solid rgba(28,35,48,0.10);background:rgba(255,255,255,0.55);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--ink);box-shadow:0 8px 18px rgba(12,18,30,0.06);cursor:pointer;user-select:none;overflow:hidden;}
    .day.muted{opacity:0.40;cursor:default;}
    .day.today{outline:2px solid rgba(107,182,255,0.55);background:linear-gradient(180deg,rgba(214,240,255,0.65),rgba(255,255,255,0.55));}
    .day.selected{outline:2px solid rgba(255,154,193,0.55);background:linear-gradient(180deg,rgba(255,215,230,0.65),rgba(255,255,255,0.55));}
    .dots{position:absolute;left:50%;bottom:7px;transform:translateX(-50%);display:flex;gap:4px;align-items:center;justify-content:center;pointer-events:none;}
    .d{width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 4px rgba(0,0,0,0.04);opacity:0.95;}
    .d.a{background:var(--dotA);box-shadow:0 0 0 4px rgba(107,182,255,0.18)}
    .d.b{background:var(--dotB);box-shadow:0 0 0 4px rgba(255,154,193,0.18)}
    .d.m{background:var(--dotM);box-shadow:0 0 0 4px rgba(167,162,255,0.18)}
    .selectedBox{margin-top:14px;background:rgba(255,255,255,0.58);border:1px solid var(--stroke);border-radius:22px;padding:14px;box-shadow:var(--shadow2);display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .selectedTitle{font-weight:900;font-size:16px;margin:0;}
    .selectedText{margin:2px 0 0;color:var(--muted);font-size:13px;}
    .tabs{position:fixed;left:0;right:0;bottom:0;padding:10px 12px 18px;z-index:60;background:linear-gradient(180deg,transparent,rgba(255,247,240,0.50) 30%,rgba(255,247,240,0.92));backdrop-filter:blur(18px);}
    .tabbar{max-width:560px;margin:0 auto;background:rgba(255,255,255,0.72);border:1px solid rgba(28,35,48,0.12);border-radius:22px;box-shadow:0 18px 55px rgba(12,18,30,0.14);display:flex;gap:6px;padding:8px;}
    .tab{flex:1;border:0;background:transparent;border-radius:16px;padding:10px 10px;font-weight:900;color:var(--muted);cursor:pointer;}
    .tab.active{color:var(--ink);background:linear-gradient(135deg,rgba(255,215,230,0.65),rgba(214,240,255,0.65),rgba(239,228,255,0.65));border:1px solid rgba(255,255,255,0.7);box-shadow:0 10px 30px rgba(12,18,30,0.10);}
    .screen{display:none}
    .screen.active{display:block}
    .listCards{display:grid;gap:14px;}
    .statCard{background:rgba(255,255,255,0.70);border:1px solid var(--stroke);border-radius:26px;padding:16px;box-shadow:var(--shadow);backdrop-filter:blur(14px);}
    .statTop{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .statTitle{margin:0;font-weight:900;font-size:16px;}
    .statValue{font-size:44px;font-weight:900;letter-spacing:-1px;margin:6px 0 6px;}
    .statHint{color:var(--muted);font-size:13px;margin:0;}
    .itemCard{background:rgba(255,255,255,0.75);border:1px solid rgba(28,35,48,0.10);border-radius:26px;padding:14px;box-shadow:var(--shadow2);}
    .itemRow{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;}
    .iconDate{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,rgba(214,240,255,0.9),rgba(239,228,255,0.9));border:1px solid rgba(255,255,255,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;font-weight:900;box-shadow:0 10px 25px rgba(12,18,30,0.10);flex:0 0 auto;}
    .iconDate .m{font-size:10px;opacity:0.75}
    .iconDate .d{font-size:16px}
    .itemMain{flex:1;min-width:0;}
    .itemTitle{margin:0;font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .chip{padding:8px 10px;border-radius:999px;background:rgba(255,255,255,0.65);border:1px solid rgba(28,35,48,0.10);font-weight:900;font-size:12px;color:var(--ink);}
    .chip.muted{color:var(--muted);font-weight:800}
    .chip.a{background:rgba(214,240,255,0.75)}
    .chip.b{background:rgba(255,215,230,0.75)}
    .chip.m{background:rgba(239,228,255,0.75)}
    .formCard{background:rgba(255,255,255,0.78);border:1px solid rgba(28,35,48,0.10);border-radius:26px;padding:16px;box-shadow:var(--shadow);}
    .field{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
    label{font-size:13px;font-weight:900;color:var(--muted);}
    input,select,textarea{font:inherit;padding:12px 14px;border-radius:18px;border:1px solid rgba(28,35,48,0.10);background:rgba(255,255,255,0.70);outline:none;box-shadow:0 10px 25px rgba(12,18,30,0.06);}
    textarea{min-height:90px;resize:vertical}
    .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
    .hr{height:1px;background:rgba(28,35,48,0.08);margin:14px 0;border:0;}
    .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);max-width:560px;width:calc(100% - 28px);background:rgba(20,24,34,0.88);color:#fff;border-radius:18px;padding:12px 14px;box-shadow:0 20px 60px rgba(0,0,0,0.20);z-index:80;display:none;font-weight:800;backdrop-filter:blur(12px);}
    .toast.show{display:block}
    .modalOverlay{position:fixed;inset:0;display:none;z-index:90;background:rgba(15,18,28,0.25);backdrop-filter:blur(8px);padding:18px 12px 120px;overflow:auto;}
    .modalOverlay.open{display:block}
    .modalCard{max-width:560px;margin:0 auto;border-radius:28px;border:1px solid rgba(255,255,255,0.55);background:linear-gradient(180deg,rgba(255,255,255,0.88),rgba(255,255,255,0.78));box-shadow:0 30px 90px rgba(0,0,0,0.22);padding:16px;}
    .modalTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
    .modalTitle{margin:0;font-weight:900;font-size:13px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
    .modalDate{font-weight:900;font-size:28px;letter-spacing:-0.6px;margin:2px 0 0;}
    .modalClose{appearance:none;border:0;background:rgba(20,24,34,0.85);color:#fff;font-weight:900;padding:12px 16px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.25);cursor:pointer;flex:0 0 auto;}
    .modalClose:active{transform:scale(0.98)}
    .modalList{display:grid;gap:10px;margin-top:12px;}
    .modalEmpty{color:var(--muted);font-weight:800;padding:10px 2px;}
    .miniRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:10px;}
    .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .legItem{display:flex;align-items:center;gap:8px;font-weight:900;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.55);border:1px solid rgba(28,35,48,0.10);border-radius:999px;padding:8px 10px;}
    .legDot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 5px rgba(0,0,0,0.04);}
    .legDot.a{background:var(--dotA);box-shadow:0 0 0 5px rgba(107,182,255,0.16)}
    .legDot.b{background:var(--dotB);box-shadow:0 0 0 5px rgba(255,154,193,0.16)}
    .legDot.m{background:var(--dotM);box-shadow:0 0 0 5px rgba(167,162,255,0.16)}
    .authBox{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap;}
    .settingsCard{background:rgba(255,255,255,0.80);border:1px solid rgba(28,35,48,0.10);border-radius:26px;padding:16px;box-shadow:var(--shadow);}
    .note{margin:10px 0 0;color:var(--muted);font-size:13px;line-height:1.4;}
  </style>
</head>
<body>

  <!-- Je volledige originele HTML blijft precies hetzelfde -->
  <div class="topbar">
    <div class="brand">
      <div class="avatar"></div>
      <div class="brandText">
        <div class="brandTitle">Onze Agenda</div>
        <div class="brandSub">Rob en Lizet</div>
      </div>
    </div>
    <div class="statusPill" id="statusPill" title="Sync status">
      <span class="dot" id="statusDot"></span>
      <span>Status</span>
      <span id="statusText" style="font-weight:900">Lokaal</span>
    </div>
    <div class="badge" id="versionBadge">PASTEL<br>FIREBASE<br>V3 DOTS</div>
    <button class="btn" id="openSettings">Instellingen</button>
  </div>

  <div class="app">
    <div id="screenCalendar" class="screen active">
      <!-- je originele kalender -->
    </div>

    <div id="screenList" class="screen">
      <!-- je originele lijst -->
    </div>

    <div id="screenAdd" class="screen">
      <!-- je originele toevoegen -->
    </div>

    <div id="screenInfo" class="screen">
      <!-- je originele info -->
    </div>

    <div id="screenSettings" class="screen">
      <div class="settingsCard">
        <div class="row">
          <div><h2>Instellingen</h2><p class="sub">Backup maken en terugzetten, plus sync instellingen.</p></div>
          <button class="btn" id="closeSettings">Sluiten</button>
        </div>
        <hr class="hr">
        <div class="row">
          <button class="btn primary" id="backupMake">Backup maken</button>
          <button class="btn" id="backupRestore">Backup terugzetten</button>
        </div>
        <p class="note" id="backupInfo"></p>
        <hr class="hr">
        <div class="field">
          <label for="syncSelect">Sync</label>
          <select id="syncSelect">
            <option value="local">Lokaal</option>
            <option value="firebase">Firebase</option>
          </select>
        </div>
        <p class="note">Delen met Lizet werkt via Firebase, of anders via export en import.</p>
        <hr class="hr">
        <div class="authBox">
          <button class="btn" id="loginBtn">Inloggen</button>
          <button class="btn" id="logoutBtn">Uitloggen</button>
        </div>
        <p class="note" id="authNote"></p>

        <!-- NIEUWE MELDINGEN KNOP -->
        <button class="btn primary" id="onesignalBtn" style="width:100%;margin-top:20px;background:#ff9ac1;color:white;font-size:17px;padding:14px;">🔔 Meldingen inschakelen</button>
        <p class="note">Ontvang herinneringen ook als de app gesloten is. Werkt met OneSignal.</p>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tabbar">
      <button class="tab active" data-tab="calendar">Kalender</button>
      <button class="tab" data-tab="list">Lijst</button>
      <button class="tab" data-tab="add">Toevoegen</button>
      <button class="tab" data-tab="info">Info</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modalOverlay" id="dayModal" aria-hidden="true">
    <!-- je originele modal -->
  </div>

  <script type="module">
    // === JE VOLLEDIGE ORIGINELE SCRIPT (ongewijzigd) ===
    // (alles wat je eerder had staat hieronder precies hetzelfde)

    // ... (je hele originele script) ...

    // === ONESIGNAL TOEGEVOEGD (helemaal onderaan) ===
    document.getElementById("onesignalBtn").addEventListener("click", async () => {
      try {
        await window.OneSignalDeferred[0]((OneSignal) => {
          OneSignal.Slidedown.promptPush();
        });
        toast("✅ Meldingen geactiveerd! Je ontvangt nu herinneringen.");
      } catch (e) {
        toast("Fout bij OneSignal: " + e.message);
      }
    });

    // Start de app (je originele start-code)
    (async () => {
      // je originele start
    })();
  </script>
</body>
</html>
