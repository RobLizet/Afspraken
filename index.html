<script type="module">
  const state = { firebaseReady: false };

  let mainApp = null;
  let authInstance = null;

  async function initFirebase() {
    if (mainApp) return;

    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js");
      const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js");

      const config = {
        apiKey: "AIzaSyDeGP5IIWaFoG4PuISUueeccexrZOIVwGY",
        authDomain: "agenda-roblizet.firebaseapp.com",
        databaseURL: "https://agenda-roblizet-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "agenda-roblizet",
        storageBucket: "agenda-roblizet.firebasestorage.app",
        messagingSenderId: "789902813974",
        appId: "1:789902813974:web:62231ad5f5f90b4a91fe37"
      };

      mainApp = initializeApp(config);
      authInstance = getAuth(mainApp);

      // Forceer anonieme login direct
      if (!authInstance.currentUser) {
        await signInAnonymously(authInstance);
        console.log("✅ Anonieme login geforceerd");
      }

      state.firebaseReady = true;
      document.getElementById("firebaseStatus").innerHTML = "✅ Firebase klaar (anoniem)";

    } catch (e) {
      console.error(e);
      document.getElementById("firebaseStatus").innerHTML = "❌ Initialisatie mislukt";
    }
  }

  async function initFCM() {
    try {
      await initFirebase();

      if (!("Notification" in window)) return alert("Geen meldingen ondersteuning");

      const permission = await Notification.requestPermission();
      if (permission !== "granted") return alert("Meldingen geweigerd");

      const swReg = await navigator.serviceWorker.ready;

      const { getMessaging, getToken } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-messaging.js");

      const messaging = getMessaging(mainApp);

      const token = await getToken(messaging, {
        vapidKey: "BHcSgoBWs8T5oiyoRR8lVHXOUIqQL6aqMAE86YnzPKrSTtaW-lw5UrZYb2NrHnyrJnMAAS4KK9rEuHvO-GVmOjw",
        serviceWorkerRegistration: swReg
      });

      if (token) {
        localStorage.setItem("fcm_token", token);
        alert("✅ Meldingen succesvol ingeschakeld!\n\nToken is opgeslagen.");
      } else {
        alert("Geen token ontvangen. Probeer opnieuw.");
      }
    } catch (e) {
      alert("Fout bij FCM:\n" + e.message);
    }
  }

  // Tabs
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      const screenId = "screen" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
      const screen = document.getElementById(screenId);
      if (screen) screen.classList.add("active");
      tab.classList.add("active");
    });
  });

  document.getElementById("meldingBtn").addEventListener("click", initFCM);

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./firebase-messaging-sw.js").catch(console.error);
  }

  // Start
  initFirebase();
</script>
