<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Onze Agenda"/>
  <meta name="theme-color" content="#ffd7e6"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
  <title>Onze Agenda - Rob & Lizet</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap">
  <style>
    :root{
      --bg1:#fff7f0; --bg2:#f4f1ff; --bg3:#eef7ff; --ink:#1d2330; --muted:#5a6578;
      --card:rgba(255,255,255,0.72); --card2:rgba(255,255,255,0.55); --stroke:rgba(28,35,48,0.10);
      --shadow:0 18px 50px rgba(12,18,30,0.10); --shadow2:0 10px 30px rgba(12,18,30,0.08);
      --pill:rgba(255,255,255,0.65); --good:#2ecc71;
      --dotA:#6bb6ff; --dotB:#ff9ac1; --dotM:#a7a2ff;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0}
    body{font-family:"DM Sans",system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff7f0,#f4f1ff 55%,#eef7ff);}
    .app{max-width:560px;margin:0 auto;padding:16px 14px 110px;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 8px 14px;position:sticky;top:0;background:rgba(255,247,240,0.9);backdrop-filter:blur(10px);}
    .btn,.tab{padding:10px 14px;border-radius:999px;border:1px solid rgba(28,35,48,0.1);background:rgba(255,255,255,0.7);font-weight:800;cursor:pointer;}
    .tab.active{background:linear-gradient(135deg,#ffd7e6,#d6f0ff,#efe4ff);}
    .screen{display:none}.screen.active{display:block}
    .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,24,34,0.88);color:#fff;padding:12px 18px;border-radius:18px;z-index:999;display:none;max-width:90%;}
    .toast.show{display:block}
  </style>
</head>
<body>

  <div class="topbar">
    <div style="font-weight:800">Onze Agenda</div>
    <button class="btn" id="openSettings">Instellingen</button>
  </div>

  <div class="app">
    <div id="screenCalendar" class="screen active">
      <h2>Kalender</h2>
      <p>Tik een dag om activiteiten te zien (nog in ontwikkeling)</p>
    </div>

    <div id="screenList" class="screen">
      <h2>Lijst</h2>
      <p>Lijst functionaliteit komt nog</p>
    </div>

    <div id="screenAdd" class="screen">
      <h2>Toevoegen</h2>
      <p>Formulier komt nog</p>
    </div>

    <div id="screenInfo" class="screen">
      <h2>Info</h2>
      <p>Made by Rob Borghouts 2026</p>
    </div>

    <div id="screenSettings" class="screen">
      <h2>Instellingen</h2>
      <button class="btn" id="meldingBtn" style="background:#ff9ac1;color:white;margin:15px 0;padding:12px 24px;font-size:16px;">🔔 Meldingen inschakelen</button>
      <p id="firebaseStatus">Status: Initialiseren...</p>
      <p class="note">Als de knop werkt, zie je een toast en een melding.</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tabbar">
      <button class="tab active" data-tab="calendar">Kalender</button>
      <button class="tab" data-tab="list">Lijst</button>
      <button class="tab" data-tab="add">Toevoegen</button>
      <button class="tab" data-tab="info">Info</button>
      <button class="tab" data-tab="settings">Instellingen</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    const state = {
      syncMode: "firebase",
      firebaseReady: false,
      user: null
    };

    let mainApp = null;
    let authInstance = null;
    let fb = null;

    async function initFirebaseApp() {
      if (mainApp) return;
      try {
        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js");
        const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js");
        const { getDatabase } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js");

        const config = {
          apiKey: "AIzaSyDeGP5IIWaFoG4PuISUueeccexrZOIVwGY",
          authDomain: "agenda-roblizet.firebaseapp.com",
          databaseURL: "https://agenda-roblizet-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "agenda-roblizet",
          appId: "1:789902813974:web:62231ad5f5f90b4a91fe37"
        };

        mainApp = initializeApp(config);
        authInstance = getAuth(mainApp);
        fb = { db: getDatabase(mainApp) };

        if (!authInstance.currentUser) {
          await signInAnonymously(authInstance);
          console.log("✅ Anonieme login geslaagd");
        }

        state.firebaseReady = true;
        document.getElementById("firebaseStatus").textContent = "✅ Firebase klaar (anoniem)";
      } catch (e) {
        console.error(e);
        document.getElementById("firebaseStatus").textContent = "❌ Firebase fout";
      }
    }

    async function initFCM() {
      try {
        await initFirebaseApp();
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return alert("Meldingen geweigerd");

        const swReg = await navigator.serviceWorker.ready;
        const { getMessaging, getToken } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-messaging.js");

        const messaging = getMessaging(mainApp);
        const token = await getToken(messaging, {
          vapidKey: "BHcSgoBWs8T5oiyoRR8lVHXOUIqQL6aqMAE86YnzPKrSTtaW-lw5UrZYb2NrHnyrJnMAAS4KK9rEuHvO-GVmOjw",
          serviceWorkerRegistration: swReg
        });

        if (token) {
          localStorage.setItem("fcm_token", token);
          alert("✅ Meldingen succesvol ingeschakeld!\n\nJe kunt nu herinneringen testen.");
          console.log("FCM Token ontvangen");
        }
      } catch (e) {
        alert("Fout bij FCM: " + e.message);
      }
    }

    // Tabs fix
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        const screenId = "screen" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
        const screen = document.getElementById(screenId);
        if (screen) screen.classList.add("active");
        tab.classList.add("active");
      });
    });

    // Meldingen knop
    document.getElementById("meldingBtn").addEventListener("click", initFCM);

    // Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./firebase-messaging-sw.js").catch(console.error);
    }

    // Start app
    initFirebaseApp();
  </script>
</body>
</html>
