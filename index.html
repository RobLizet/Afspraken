<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Onze Agenda"/>
  <meta name="theme-color" content="#ffd7e6"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
  <title>Onze Agenda - Rob & Lizet</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap">

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "bd952794-c008-4b73-bb77-94f7df223bd0",
        safari_web_id: "web.onesignal.auto.458f9dc8-6677-4788-b5a2-9d66a9d7a179",
        notifyButton: { enable: true }
      });
    });
  </script>

  <style>
    :root{--bg1:#fff7f0;--bg2:#f4f1ff;--bg3:#eef7ff;--ink:#1d2330;--muted:#5a6578;--card:rgba(255,255,255,0.72);--card2:rgba(255,255,255,0.55);--stroke:rgba(28,35,48,0.10);--shadow:0 18px 50px rgba(12,18,30,0.10);--pill:rgba(255,255,255,0.65);--good:#2ecc71;}
    *{box-sizing:border-box} html,body{height:100%;margin:0}
    body{font-family:"DM Sans",system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff7f0,#f4f1ff 55%,#eef7ff);}
    .app{max-width:560px;margin:0 auto;padding:16px 14px 110px;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 8px 14px;position:sticky;top:0;background:rgba(255,247,240,0.9);backdrop-filter:blur(10px);}
    .btn,.tab{padding:10px 14px;border-radius:999px;border:1px solid rgba(28,35,48,0.1);background:rgba(255,255,255,0.7);font-weight:800;cursor:pointer;}
    .tab.active{background:linear-gradient(135deg,#ffd7e6,#d6f0ff,#efe4ff);}
    .screen{display:none}.screen.active{display:block}
    .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,24,34,0.88);color:#fff;padding:12px 18px;border-radius:18px;z-index:999;display:none;max-width:90%;}
    .toast.show{display:block}
    .appointment-card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
  </style>
</head>
<body>

  <div class="topbar">
    <div style="font-weight:800">Onze Agenda</div>
    <button class="btn" id="openSettings">Instellingen</button>
  </div>

  <div class="app">
    <div id="screenCalendar" class="screen active"><h2>Kalender</h2><p>Data laden...</p></div>
    <div id="screenList" class="screen"><h2>Afspraken</h2><div id="appointmentsList"></div></div>
    <div id="screenAdd" class="screen"><h2>Toevoegen</h2><p>Komt later</p></div>
    <div id="screenInfo" class="screen"><h2>Info</h2><p>Made by Rob Borghouts 2026</p></div>

    <div id="screenSettings" class="screen">
      <h2>Instellingen</h2>
      <button class="btn" id="onesignalBtn" style="background:#ff9ac1;color:white;margin:10px 0;">🔔 Meldingen inschakelen</button>
      <button class="btn primary" id="importFirebaseBtn" style="margin:10px 0;background:#4a90e2;color:white;">📥 Data ophalen uit Firebase (jouw echte afspraken)</button>
      <p id="statusText">Klaar</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tabbar">
      <button class="tab active" data-tab="calendar">Kalender</button>
      <button class="tab" data-tab="list">Afspraken</button>
      <button class="tab" data-tab="add">Toevoegen</button>
      <button class="tab" data-tab="info">Info</button>
      <button class="tab" data-tab="settings">Instellingen</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    let mainApp = null;
    let fb = null;

    async function initFirebase() {
      if (mainApp) return;
      try {
        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js");
        const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js");

        const config = {
          apiKey: "AIzaSyDeGP5IIWaFoG4PuISUueeccexrZOIVwGY",
          authDomain: "agenda-roblizet.firebaseapp.com",
          databaseURL: "https://agenda-roblizet-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "agenda-roblizet",
          messagingSenderId: "789902813974",
          appId: "1:789902813974:web:62231ad5f5f90b4a91fe37"
        };

        mainApp = initializeApp(config);
        const database = getDatabase(mainApp);
        fb = { db: database, dbMod: { get, ref } };

        document.getElementById("statusText").innerHTML = "✅ Firebase verbonden";
      } catch (e) { console.error(e); }
    }

    async function importFromFirebase() {
      if (!fb) return alert("Firebase niet verbonden");

      const path = "/users/zweetzakken_gmail_com";   // ← jouw exacte pad

      try {
        const snap = await fb.dbMod.get(fb.dbMod.ref(fb.db, path));

        if (snap.exists()) {
          const data = snap.val() || {};
          const appointments = data.appointments || data || {};

          const saveData = { appointments, birthdays: {}, memories: {} };
          localStorage.setItem("rb_data_v3", JSON.stringify(saveData));

          const count = Object.keys(appointments).length;
          alert(`✅ Jouw echte afspraken geladen!\n\nAfspraken: ${count}\n\nApp wordt herladen...`);

          location.reload();
        } else {
          alert("Geen data gevonden op /users/zweetzakken_gmail_com");
        }
      } catch (e) {
        alert("Fout: " + e.message);
      }
    }

    function renderAppointments() {
      const container = document.getElementById("appointmentsList");
      container.innerHTML = "";

      const stored = localStorage.getItem("rb_data_v3");
      if (!stored) return container.innerHTML = "<p>Geen afspraken.</p>";

      const { appointments } = JSON.parse(stored);
      if (Object.keys(appointments).length === 0) return container.innerHTML = "<p>Geen afspraken gevonden.</p>";

      Object.keys(appointments).forEach(key => {
        const ap = appointments[key];
        const card = document.createElement("div");
        card.className = "appointment-card";
        card.innerHTML = `<strong>\( {ap.date || 'Onbekende datum'}</strong><br> \){ap.title || ap.naam || 'Afspraak'}<br><small>${ap.time || ''}</small>`;
        container.appendChild(card);
      });
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        const screenId = "screen" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
        document.getElementById(screenId).classList.add("active");
        tab.classList.add("active");
        if (tab.dataset.tab === "list") renderAppointments();
      });
    });

    document.getElementById("importFirebaseBtn").addEventListener("click", importFromFirebase);
    document.getElementById("onesignalBtn").addEventListener("click", () => {
      window.OneSignalDeferred.push(OneSignal => OneSignal.Slidedown.promptPush());
    });

    initFirebase();
  </script>
</body>
</html>
