<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Onze Agenda"/>
  <meta name="theme-color" content="#ffd7e6"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
  <title>Onze Agenda - Rob & Lizet</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap">

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "bd952794-c008-4b73-bb77-94f7df223bd0",
        safari_web_id: "web.onesignal.auto.458f9dc8-6677-4788-b5a2-9d66a9d7a179",
        notifyButton: { enable: true }
      });
    });
  </script>

  <style>
    :root{
      --bg1:#fff7f0; --bg2:#f4f1ff; --bg3:#eef7ff; --ink:#1d2330; --muted:#5a6578;
      --card:rgba(255,255,255,0.72); --card2:rgba(255,255,255,0.55); --stroke:rgba(28,35,48,0.10);
      --shadow:0 18px 50px rgba(12,18,30,0.10); --shadow2:0 10px 30px rgba(12,18,30,0.08);
      --pill:rgba(255,255,255,0.65); --good:#2ecc71;
      --dotA:#6bb6ff; --dotB:#ff9ac1; --dotM:#a7a2ff;
    }
    *{box-sizing:border-box} 
    html,body{height:100%;margin:0}
    body{font-family:"DM Sans",system-ui,sans-serif;color:var(--ink);
      background:linear-gradient(180deg,#fff7f0,#f4f1ff 55%,#eef7ff);}
    .app{max-width:560px;margin:0 auto;padding:16px 14px 110px;}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 8px 14px;position:sticky;top:0;background:rgba(255,247,240,0.9);backdrop-filter:blur(10px);}
    .btn,.tab{padding:10px 14px;border-radius:999px;border:1px solid rgba(28,35,48,0.1);background:rgba(255,255,255,0.7);font-weight:800;cursor:pointer;}
    .tab.active{background:linear-gradient(135deg,#ffd7e6,#d6f0ff,#efe4ff);}
    .screen{display:none}.screen.active{display:block}
    .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(20,24,34,0.88);color:#fff;padding:12px 18px;border-radius:18px;z-index:999;display:none;max-width:90%;}
    .toast.show{display:block}
  </style>
</head>
<body>

  <div class="topbar">
    <div style="font-weight:800">Onze Agenda</div>
    <button class="btn" id="openSettings">Instellingen</button>
  </div>

  <div class="app">
    <div id="screenCalendar" class="screen active">
      <h2>Kalender</h2>
      <p>Tabs werken nu. Test de meldingen knop in Instellingen.</p>
    </div>

    <div id="screenList" class="screen">
      <h2>Lijst</h2>
      <p>Lijst functionaliteit komt later</p>
    </div>

    <div id="screenAdd" class="screen">
      <h2>Toevoegen</h2>
      <p>Formulier komt later</p>
    </div>

    <div id="screenInfo" class="screen">
      <h2>Info</h2>
      <p>Made by Rob Borghouts 2026</p>
    </div>

    <div id="screenSettings" class="screen">
      <h2>Instellingen</h2>
      <button class="btn" id="onesignalBtn" style="background:#ff9ac1;color:white;margin:20px 0;padding:14px 30px;font-size:17px;">🔔 Meldingen inschakelen</button>
      <p id="statusText">OneSignal status: Klaar om te activeren</p>
      <p class="note">Klik op de knop hierboven om meldingen in te schakelen.</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tabbar">
      <button class="tab active" data-tab="calendar">Kalender</button>
      <button class="tab" data-tab="list">Lijst</button>
      <button class="tab" data-tab="add">Toevoegen</button>
      <button class="tab" data-tab="info">Info</button>
      <button class="tab" data-tab="settings">Instellingen</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Tabs functionaliteit
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        const screenId = "screen" + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
        const screen = document.getElementById(screenId);
        if (screen) screen.classList.add("active");
        tab.classList.add("active");
      });
    });

    // OneSignal meldingen knop
    document.getElementById("onesignalBtn").addEventListener("click", async () => {
      const statusText = document.getElementById("statusText");
      statusText.textContent = "OneSignal wordt geactiveerd...";

      try {
        // Wacht even tot OneSignal volledig is geladen
        await new Promise(resolve => setTimeout(resolve, 800));

        const OneSignal = window.OneSignal;
        if (!OneSignal) {
          alert("OneSignal is nog niet geladen. Probeer de pagina te verversen.");
          return;
        }

        // Open de toestemming prompt
        await OneSignal.Slidedown.promptPush();

        statusText.innerHTML = "✅ Meldingen zijn ingeschakeld!";
        toast("OneSignal meldingen geactiveerd!");

        // Stuur een testmelding na 2 seconden
        setTimeout(() => {
          OneSignal.notifications.create({
            title: "Test van Onze Agenda",
            body: "Dit is een testmelding. Herinneringen werken nu!",
            icon: "./icon-192.png"
          });
        }, 2000);

      } catch (e) {
        console.error(e);
        statusText.textContent = "❌ Fout bij activeren";
        toast("Fout bij OneSignal: " + e.message);
      }
    });

    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    // Service Worker (voor background support)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./firebase-messaging-sw.js").catch(console.error);
    }
  </script>
</body>
</html>
